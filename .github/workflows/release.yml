name: Release

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      notify_users:
        description: "Send user notifications"
        required: false
        default: "false"
      test_title:
        description: "Test release title"
        required: false
        default: "Test release"

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc -b

      - name: Build
        run: npm run build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Publish release notification
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RELEASE_FORCE_NOTIFY: ${{ github.event_name == 'workflow_dispatch' && inputs.notify_users == 'true' }}
          RELEASE_TEST_TITLE: ${{ inputs.test_title }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: node scripts/publish-release-update.mjs
